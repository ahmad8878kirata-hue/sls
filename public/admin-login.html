<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الإدارة - موقع SLS</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>


    <div class="container" style="max-width: 420px; margin-top: 80px;">
        <div class="glass">
            <div class="login-logo">
                <img src="img/logo.jpg" alt="SLS Logo">
                <span>دخول الإدارة</span>
            </div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">اسم المستخدم</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">كلمة المرور</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div id="error-msg" style="color: var(--danger); margin-bottom: 15px; display: none;"></div>
                <button type="submit" class="btn btn-danger" style="width: 100%;">دخول للمدير</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('http://localhost:3001/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    if (data.user.role !== 'admin') {
                        errorMsg.innerText = 'هذا الحساب ليس لديه صلاحيات الإدارة';
                        errorMsg.style.display = 'block';
                        return;
                    }
                    setToken(data.token);
                    setUser(data.user);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.innerText = data.error || 'حدث خطأ في تسجيل الدخول';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'فشل الاتصال بالخادم';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
