<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - موقع SLS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <img src="img/logo.jpg" alt="SLS Logo" class="logo-img">
            <span class="logo-text">SLS</span>
        </a>
    </header>

    <div class="container" style="max-width: 420px; margin-top: 80px;">
        <div class="glass">
            <div class="login-logo">
                <img src="img/logo.jpg" alt="SLS Logo">
                <span>إنشاء حساب جديد</span>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">اسم المستخدم</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">كلمة المرور</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div id="error-msg" style="color: var(--danger); margin-bottom: 15px; display: none;"></div>
                <div id="success-msg" style="color: var(--success); margin-bottom: 15px; display: none;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">إنشاء حساب</button>
            </form>
            <div class="text-center mt-20">
                <p style="color: var(--text-muted);">لديك حساب بالفعل؟ <a href="index.html" style="color: var(--primary-color);">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                
                if (res.ok) {
                    successMsg.innerText = 'تم إنشاء الحساب بنجاح، جاري التحويل...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    errorMsg.innerText = data.error || 'حدث خطأ';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'فشل الاتصال بالخادم';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
