<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن الرصيد - SLS</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <a href="services.html" class="logo">
            <img src="img/logo.jpg" alt="SLS Logo" class="logo-img">
            <span class="logo-text"></span>
        </a>
        <div class="user-info" id="user-info"></div>
    </header>

    <div class="container" style="max-width: 600px;">
        <div class="glass">
            <h2 class="mb-20" style="color: var(--primary-color); text-align: center;">طلب شحن الرصيد</h2>
            <form id="topupForm">
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">العملة المراد شحنها</label>
                    <select id="currency" class="form-control" required>
                        <option value="SYP">ليرة سورية (SYP)</option>
                        <option value="USD">دولار أمريكي (USD)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">طريقة التحويل</label>
                    <select id="method" class="form-control" required>
                        <!-- Options generated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">المبلغ المحول</label>
                    <input type="number" id="amount" class="form-control" step="0.01" required placeholder="أدخل المبلغ الذي قمت بتحويله">
                </div>
                <div class="form-group">
                    <label class="mb-20" style="display: block; color: var(--text-muted);">صورة الإيصال أو إشعار التحويل</label>
                    <input type="file" id="receipt" class="form-control" accept="image/*" required>
                    <img id="receipt-preview" style="display: none; width: 100%; margin-top: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);">
                </div>
                <div id="error-msg" style="color: var(--danger); margin-bottom: 15px; display: none; text-align: center;"></div>
                <div id="success-msg" style="color: var(--success); margin-bottom: 15px; display: none; text-align: center;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        updateHeader();

        const currencySelect = document.getElementById('currency');
        const methodSelect = document.getElementById('method');
        
        const methodsByCurrency = {
            'SYP': [
                { value: 'Syriatel Cash', label: 'سيريتل كاش (Syriatel Cash)' },
                { value: 'Sham Cash', label: 'شام كاش (Sham Cash)' },
                { value: 'Hawally', label: 'حوالة (الهرم أو الفؤاد)' }
            ],
            'USD': [
                { value: 'USDT', label: 'USDT' },
                { value: 'Sham Cash', label: 'شام كاش (Sham Cash)' },
                { value: 'Hawally', label: 'حوالة (الهرم أو الفؤاد)' }
            ]
        };

        function updateMethods() {
            const currency = currencySelect.value;
            const methods = methodsByCurrency[currency] || [];
            methodSelect.innerHTML = '';
            methods.forEach(m => {
                const option = document.createElement('option');
                option.value = m.value;
                option.innerText = m.label;
                methodSelect.appendChild(option);
            });
        }

        currencySelect.addEventListener('change', updateMethods);
        updateMethods(); // Initialize options

        const receiptInput = document.getElementById('receipt');
        const preview = document.getElementById('receipt-preview');
        let receiptBase64 = '';

        receiptInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    receiptBase64 = evt.target.result;
                    preview.src = receiptBase64;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
                receiptBase64 = '';
            }
        });

        document.getElementById('topupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';

            const currency = document.getElementById('currency').value;
            const method = document.getElementById('method').value;
            const amount = document.getElementById('amount').value;

            if (!receiptBase64) {
                errorMsg.innerText = 'الرجاء إرفاق صورة الإيصال';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'إرسال الطلب';
                return;
            }

            try {
                const res = await fetchWithAuth('/top-up', {
                    method: 'POST',
                    body: JSON.stringify({ currency, method, amount: parseFloat(amount), receipt_image: receiptBase64 })
                });

                const data = await res.json();
                
                if (res.ok) {
                    successMsg.innerText = 'تم إرسال طلب الشحن بنجاح! سيتم مراجعته قريباً.';
                    successMsg.style.display = 'block';
                    document.getElementById('topupForm').reset();
                    preview.style.display = 'none';
                    receiptBase64 = '';
                } else {
                    errorMsg.innerText = data.error || 'فشل في إرسال الطلب';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'خطأ في الاتصال بالخادم';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = 'إرسال الطلب';
            }
        });
    </script>
</body>

</html>
